<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Карманный помощник Таро · Жанна Раевская</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

:root{
  --bg:        #1a0810;
  --bg2:       #240d16;
  --bg3:       #2e1020;
  --cranberry: #8B1A2F;
  --cran2:     #A32038;
  --gold:      #C9A84C;
  --gold2:     #D4B050;
  --gold3:     #E8C97A;
  --gold-pale: rgba(201,168,76,0.15);
  --text:      #faf4ee;
  --text-m:    #d4c4b4;
  --text-s:    #9a8878;
  --border:    rgba(201,168,76,0.25);
}

body{background:var(--bg);min-height:100vh;color:var(--text);font-family:'Jost',sans-serif;font-size:17px}

@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes shimmer{0%,100%{opacity:0.5}50%{opacity:1}}
@keyframes glow{0%,100%{box-shadow:0 0 18px rgba(201,168,76,0.2)}50%{box-shadow:0 0 32px rgba(201,168,76,0.45)}}
@keyframes cardIn{from{opacity:0;transform:translateY(18px) scale(0.97)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

.fade-up{animation:fadeUp 0.75s ease both}
.d1{animation-delay:0.12s}.d2{animation-delay:0.24s}

.page{display:flex;flex-direction:column;align-items:center;padding:50px 20px 80px}

/* ══ HEADER ══ */
.header{text-align:center;margin-bottom:52px;max-width:700px;width:100%}
.stars-row{display:flex;justify-content:center;align-items:center;gap:20px;margin-bottom:16px}
.s{color:var(--gold);animation:shimmer 2s ease-in-out infinite}
.s1{font-size:13px;opacity:0.6;animation-delay:0s}
.s2{font-size:28px;opacity:1;animation-delay:0.4s}
.back-link{
  display:inline-flex;align-items:center;gap:8px;
  font-family:'Jost',sans-serif;font-size:13px;
  letter-spacing:.18em;text-transform:uppercase;
  color:var(--text-s);text-decoration:none;
  transition:color .2s;margin-bottom:24px;
}
.back-link:hover{color:var(--gold)}
.back-link::before{content:"←";font-size:15px}

h1{
  font-family:'Playfair Display',serif;
  font-size:clamp(28px,5vw,48px);
  font-weight:700;
  color:#fff;
  line-height:1.15;
  margin-bottom:10px;
  letter-spacing:.02em;
}
h1 em{
  font-style:italic;
  font-weight:400;
  color:var(--gold2);
}
.subtitle{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(17px,2.5vw,21px);
  color:var(--text-m);
  font-style:italic;font-weight:300;
  letter-spacing:0.06em;line-height:1.5;
}
.gold-line{
  height:1px;width:120px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
  margin:20px auto 0;
}

/* ══ CARD ══ */
.card{
  width:100%;max-width:680px;
  background:rgba(139,26,47,0.08);
  border:1px solid var(--border);
  border-radius:20px;
  padding:clamp(24px,4vw,44px);
  box-shadow:0 8px 40px rgba(0,0,0,0.3);
}

.input-label{
  display:block;
  font-family:'Cormorant Garamond',serif;
  font-size:21px;font-weight:400;
  color:var(--gold);
  margin-bottom:14px;letter-spacing:0.05em;
}
textarea{
  width:100%;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(201,168,76,0.2);
  border-radius:10px;
  padding:16px 18px;
  color:var(--text);
  font-family:'Jost',sans-serif;font-size:16px;
  line-height:1.8;resize:vertical;min-height:135px;
  transition:border-color .2s,background .2s;
}
textarea:focus{outline:none;border-color:rgba(201,168,76,0.55);background:rgba(255,255,255,0.06)}
textarea::placeholder{color:rgba(154,136,120,0.7);font-style:italic}

.input-footer{display:flex;justify-content:space-between;align-items:center;margin-top:20px;flex-wrap:wrap;gap:12px}
.hint{font-size:13px;color:var(--text-s)}

/* Кнопка */
.btn-primary{
  background:var(--cranberry);
  border:2px solid var(--gold);
  border-radius:10px;
  color:#fff;
  font-family:'Cormorant Garamond',serif;
  font-size:19px;font-weight:600;
  letter-spacing:0.1em;
  padding:12px 28px;
  cursor:pointer;transition:all .25s;
  display:inline-flex;align-items:center;gap:10px;
  box-shadow:0 4px 16px rgba(139,26,47,0.4), 0 0 12px rgba(201,168,76,0.15);
  animation:glow 3s ease-in-out infinite;
}
.btn-primary:hover{transform:translateY(-2px);background:var(--cran2);border-color:var(--gold3);box-shadow:0 6px 24px rgba(139,26,47,0.5)}
.btn-primary:active{transform:scale(0.97)}
.btn-primary:disabled{background:rgba(139,26,47,0.15);border:2px solid rgba(201,168,76,0.2);color:var(--text-s);cursor:not-allowed;transform:none;box-shadow:none;animation:none}

/* ══ РЕЗУЛЬТАТ ══ */
.result-label{font-size:12px;letter-spacing:0.25em;color:var(--text-s);text-transform:uppercase;text-align:center;margin-bottom:18px}

.arcana-display{display:flex;justify-content:center;gap:24px;flex-wrap:wrap;margin-bottom:28px}
.arcana-card{
  background:rgba(201,168,76,0.06);
  border:1px solid var(--border);
  border-radius:14px;
  padding:20px 24px 24px;
  min-width:160px;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:10px;
}
.arcana-svg{width:80px;height:110px;opacity:0.92;animation:float 4s ease-in-out infinite}
.arcana-meta{font-family:'Cormorant Garamond',serif;font-size:13px;color:var(--text-s);letter-spacing:.18em;text-transform:uppercase}
.arcana-name{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;font-style:italic;color:var(--gold2);letter-spacing:.02em;line-height:1.1}

.divider-r{height:1px;background:linear-gradient(90deg,transparent,rgba(201,168,76,0.3),transparent);margin:22px 0}
.section-lbl{font-size:12px;letter-spacing:.22em;color:var(--text-s);text-transform:uppercase;margin-bottom:10px}

.reason-text{
  font-family:'Cormorant Garamond',serif;
  font-size:20px;font-weight:300;
  color:var(--text);
  line-height:1.8;font-style:italic;margin-bottom:22px;
}

.focus-box{
  background:rgba(201,168,76,0.06);
  border:1px solid rgba(201,168,76,0.2);
  border-left:3px solid var(--gold);
  border-radius:12px;padding:18px 22px;margin-bottom:24px;
}
.focus-lbl{font-size:12px;letter-spacing:.22em;color:var(--gold);text-transform:uppercase;margin-bottom:9px}
.focus-text{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:300;color:var(--text);line-height:1.8}

.aff-toggle{
  width:100%;background:transparent;
  border:2px solid var(--gold);
  border-radius:10px;
  color:var(--gold);
  font-family:'Cormorant Garamond',serif;font-size:18px;
  padding:14px 22px;cursor:pointer;
  letter-spacing:.05em;text-align:left;
  display:flex;justify-content:space-between;align-items:center;
  transition:all .2s;
}
.aff-toggle:hover{background:rgba(201,168,76,0.08);color:var(--gold3);border-color:var(--gold3)}
.aff-toggle.open{border-radius:10px 10px 0 0}
.chevron{font-size:22px;transition:transform .25s;display:inline-block}
.chevron.open{transform:rotate(90deg)}.chevron.closed{transform:rotate(-90deg)}

.aff-body{
  background:rgba(255,255,255,0.02);
  border:1px solid rgba(201,168,76,0.15);
  border-top:none;border-radius:0 0 10px 10px;
  padding:24px 26px;
  animation:fadeUp .4s ease both;
}
.aff-para{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;color:var(--text-m);line-height:1.9;margin-bottom:13px;font-style:italic}
.aff-para:first-child{font-style:normal;font-size:19px;color:var(--gold3)}
.aff-para:last-child{margin-bottom:0;font-style:normal;color:var(--gold)}

.action-row{display:flex;gap:14px;margin-top:24px}
.btn-ghost{
  flex:1;background:transparent;
  border:2px solid var(--gold);
  border-radius:10px;color:var(--gold);
  font-family:'Cormorant Garamond',serif;font-size:17px;
  padding:13px;cursor:pointer;letter-spacing:.05em;transition:all .2s;
}
.btn-ghost:hover{background:rgba(201,168,76,0.08);color:var(--gold3);border-color:var(--gold3)}
.btn-new{
  flex:1;
  background:var(--cranberry);
  border:2px solid var(--gold);
  border-radius:10px;
  color:#fff;
  font-family:'Cormorant Garamond',serif;font-size:17px;
  padding:13px;cursor:pointer;letter-spacing:.05em;transition:all .2s;
  box-shadow:0 0 12px rgba(201,168,76,0.15);
}
.btn-new:hover{background:var(--cran2);border-color:var(--gold3);box-shadow:0 0 20px rgba(201,168,76,0.3)}

.error-msg{margin-top:15px;color:#e08878;font-size:15px;text-align:center}

/* ══ FOOTER ══ */
.footer{margin-top:44px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:16px}
.tg-btn{
  display:inline-flex;align-items:center;gap:10px;
  background:var(--cranberry);
  border:2px solid var(--gold);
  border-radius:10px;
  color:#fff;
  font-family:'Jost',sans-serif;font-size:15px;font-weight:500;
  padding:12px 28px;text-decoration:none;
  transition:all .2s;letter-spacing:.03em;
  box-shadow:0 4px 16px rgba(139,26,47,0.4), 0 0 12px rgba(201,168,76,0.15);
}
.tg-btn:hover{background:var(--cran2);border-color:var(--gold3);transform:translateY(-2px);box-shadow:0 6px 24px rgba(139,26,47,0.5)}
.tg-icon{width:20px;height:20px;fill:#fff}
.footer-text{font-size:15px;color:var(--text-s)}
.footer-text a{
  font-family:'Playfair Display',serif;
  font-size:18px;
  font-style:italic;
  font-weight:700;
  color:var(--gold);
  text-decoration:none;
  transition:color .2s;
  letter-spacing:.06em;
}
.footer-text a:hover{color:var(--gold3)}

@media(max-width:480px){.input-footer{justify-content:flex-end}.hint{display:none}.action-row{flex-direction:column}}
</style>
</head>

<div class="page">

<header class="header fade-up">
  <a href="https://zhannaraevskaya-art.github.io/zhanna.Claude-/" class="back-link">На главную</a>
  <div class="stars-row">
    <span class="s s1">✦</span><span class="s s2">✦</span><span class="s s1">✦</span>
  </div>
  <h1>Карманный<br><em>помощник Таро</em></h1>
  <p class="subtitle">Опишите свою ситуацию — и карты подскажут путь</p>
  <div class="gold-line"></div>
</header>

<div class="card fade-up d1" id="mainCard">
  <div id="inputScreen">
    <label class="input-label" for="sit">Расскажите о своей ситуации</label>
    <textarea id="sit" placeholder="Например: «Хочу открыть своё дело, но не знаю с чего начать» или «Чувствую тупик в отношениях, не понимаю как поступить»"></textarea>
    <div class="input-footer">
      <span class="hint">Ctrl + Enter для отправки</span>
      <button class="btn-primary" id="submitBtn" onclick="runQuery()" disabled>✦&nbsp; Узнать аркан</button>
    </div>
    <p class="error-msg" id="errorMsg" style="display:none"></p>
  </div>
  <div id="resultScreen" style="display:none"></div>
</div>

<footer class="footer fade-up d2">
  <a class="tg-btn" href="https://t.me/zhanna_raevskaya" target="_blank">
    <svg class="tg-icon" viewBox="0 0 24 24"><path d="M12 0C5.373 0 0 5.373 0 12s5.373 12 12 12 12-5.373 12-12S18.627 0 12 0zm5.894 8.221-1.97 9.28c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12L7.43 13.267l-2.96-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.718.292z"/></svg>
    Написать в Telegram
  </a>
  <p class="footer-text"><a href="https://zhannaraevskaya-art.github.io/zhanna.Claude-/">Жанна Раевская · Таро. Жить собой</a></p>
</footer>
</div>

function getAffirmation(name){
  return[
    `Я призываю силы Земли, силы Вселенной, силы аркана ${name}!`,
    `Я призываю аркан ${name} помочь мне в моём деле.`,
    `Прямо сейчас я чувствую и ощущаю помощь аркана ${name} в моей жизни.`,
    `Я знаю, и знаю, как это чувствуется — иметь расширение возможностей энергией аркана ${name}.`,
    `Я ощущаю, как возможности Вселенной текут ко мне, как силы просыпаются во мне.`,
    `Я получаю желаемое.`,
    `Благодарю тебя, Вселенная! Благодарю тебя, ${name}.`,
    `Я получаю помощь и твою мудрость прямо сейчас.`
  ];
}

function analyze(text){
  const t=text.toLowerCase();
  const scores=ARCANA.map(a=>{
    let s=0;
    a.kw.forEach(k=>{if(t.includes(k)) s+=k.length>6?3:k.includes(" ")?4:1;});
    return{num:a.num,score:s};
  });
  const sorted=scores.filter(x=>x.score>0).sort((a,b)=>b.score-a.score);
  if(sorted.length===0) return{arcana:10,arcana2:null};
  const a1=sorted[0].num;
  const a2=(sorted.length>1&&sorted[1].score>=sorted[0].score*0.55)?sorted[1].num:null;
  return{arcana:a1,arcana2:a2};
}

const textarea=document.getElementById('sit');
const submitBtn=document.getElementById('submitBtn');
textarea.addEventListener('input',()=>{submitBtn.disabled=!textarea.value.trim();});
textarea.addEventListener('keydown',e=>{if(e.key==='Enter'&&e.ctrlKey)runQuery();});

function runQuery(){
  const sit=textarea.value.trim();
  if(!sit)return;
  showResult(analyze(sit));
}

function cardHTML(a){
  return`<div class="arcana-card"><div class="arcana-svg">${SVGS[a.num]||''}</div><p class="arcana-meta">${a.roman} · ${a.eng}</p><p class="arcana-name">${a.name}</p></div>`;
}

function showResult(result){
  const a1=ARCANA.find(a=>a.num===result.arcana);
  const a2=result.arcana2!==null&&result.arcana2!==undefined?ARCANA.find(a=>a.num===result.arcana2):null;
  const chips=[a1,a2].filter(Boolean).map(cardHTML).join('');
  const aff=getAffirmation(a1.name).map(l=>`<p class="aff-para">${esc(l)}</p>`).join('');
  document.getElementById('inputScreen').style.display='none';
  const rs=document.getElementById('resultScreen');
  rs.style.display='block';
  rs.innerHTML=`<div style="animation:cardIn 0.6s ease both">
    <p class="result-label">Ваш аркан</p>
    <div class="arcana-display">${chips}</div>
    <div class="divider-r"></div>
    <p class="section-lbl">Почему этот аркан</p>
    <p class="reason-text">${esc(a1.reason)}</p>
    <div class="focus-box">
      <p class="focus-lbl">Намерение</p>
      <p class="focus-text">${esc(a1.focus)}</p>
    </div>
    <button class="aff-toggle" id="affBtn" onclick="toggleAff()">
      <span>✦&nbsp; Текст обращения к аркану</span>
      <span class="chevron closed" id="affChev">‹</span>
    </button>
    <div id="affBody" style="display:none" class="aff-body">${aff}</div>
    <div class="action-row">
      <button class="btn-ghost" onclick="editQuery()">Изменить запрос</button>
      <button class="btn-new" onclick="newQuery()">✦ Новый запрос</button>
    </div>
  </div>`;
}

function toggleAff(){
  const b=document.getElementById('affBody'),ch=document.getElementById('affChev'),btn=document.getElementById('affBtn');
  const open=b.style.display==='none';
  b.style.display=open?'block':'none';
  ch.className=open?'chevron open':'chevron closed';
  btn.className=open?'aff-toggle open':'aff-toggle';
}
function editQuery(){
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('inputScreen').style.display='block';
  submitBtn.disabled=false;
}
function newQuery(){
  textarea.value='';submitBtn.disabled=true;
  document.getElementById('resultScreen').style.display='none';
  document.getElementById('inputScreen').style.display='block';
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
